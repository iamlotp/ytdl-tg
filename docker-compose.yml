services:
  ytdl-bot:
    build: .
    env_file: .env
    restart: unless-stopped
    environment:
      - DOWNLOAD_DIR=/downloads
    volumes:
      # Service account JSON — REQUIRED
      - ./config:/config:ro
      # Optional cookies.txt for age-restricted content
      - ./cookies:/cookies
      # Disk-backed download staging area (uses /dev/sda1 space, not RAM)
      - ./downloads:/downloads
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
